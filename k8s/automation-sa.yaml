# Dedicated ServiceAccount for automation/agents (CI, bots) to operate
# the cluster WITHOUT AWS credentials. Bound to cluster-admin by choice —
# treat its token like a root credential and rotate by deleting the
# Secret (a new token is minted automatically).
#
# Extract a kubeconfig for it with: scripts/make-automation-kubeconfig.sh
apiVersion: v1
kind: ServiceAccount
metadata:
  name: automation
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: automation-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: automation
    namespace: kube-system
---
# Long-lived token (k8s stopped auto-creating these in 1.24)
apiVersion: v1
kind: Secret
metadata:
  name: automation-token
  namespace: kube-system
  annotations:
    kubernetes.io/service-account.name: automation
type: kubernetes.io/service-account-token
