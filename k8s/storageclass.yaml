# EKS ships a gp2 StorageClass that is NOT marked default, so chart PVCs
# (Airflow postgres, triggerer logs) sit Pending forever. This gp3 class
# is the cluster default and uses the EBS CSI driver addon.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
